<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — Lawrence Township</title>
  <meta name="description" content="News and announcements from Lawrence Township, Tioga County, Pennsylvania.">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="drive.js"></script>
</head>
<body>

  <!-- ====== HEADER ====== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo" style="text-decoration:none;">
        <span class="logo-name">Lawrence Township</span>
        <span class="logo-sub">Tioga County, Pennsylvania</span>
      </a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="news.html" class="active">Announcements</a>
        <a href="meetings.html">Meetings</a>
        <a href="ordinances.html">Ordinances</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- ====== PAGE HERO ====== -->
  <div class="page-hero">
    <div class="page-hero-inner">
      <h1>Announcements</h1>
      <p>Official notices and updates from Lawrence Township</p>
    </div>
  </div>

  <!-- ====== MAIN CONTENT ====== -->
  <div class="content-full">
    <div class="section-label">Latest Updates</div>
    <div id="announcements-container">
      <p class="drive-loading">Loading announcements&hellip;</p>
    </div>
  </div>

  <!-- ====== FOOTER ====== -->
  <footer class="site-footer">
    <div class="footer-inner" id="footer-contact"></div>
  </footer>

  <script>
    UI.renderFooter();

    (async function () {
      const container = document.getElementById("announcements-container");
      try {
        const files  = await Drive.getFilesRecursively(CONFIG.driveFolders.announcements);
        const sorted = Drive.sortByDate(files);

        if (sorted.length === 0) {
          container.innerHTML = `<p class="drive-loading">No announcements at this time.</p>`;
          return;
        }

        // Fetch content for each announcement in parallel
        const items = await Promise.all(sorted.map(async file => {
          const info = Drive.parseFilename(file.name);
          if (!info) return null;

          let bodyHtml = "";
          try {
            if (file.mimeType === "application/vnd.google-apps.document") {
              bodyHtml = await Drive.getDocHtml(file.id);
            }
          } catch (e) {
            bodyHtml = `<a href="${file.webViewLink}" target="_blank" rel="noopener">View announcement &rarr;</a>`;
          }

          return { info, file, bodyHtml };
        }));

        container.innerHTML = items
          .filter(Boolean)
          .map(({ info, file, bodyHtml }) => `
            <div class="card" style="margin-bottom:16px;">
              <div class="news-item" style="padding-top:0; border-bottom:none; padding-bottom:0;">
                <div class="news-date">${info.displayDate}</div>
                <div class="news-title">${info.title}</div>
                ${bodyHtml
                  ? `<div class="announcement-content">${bodyHtml}</div>`
                  : `<div class="announcement-content"><a href="${file.webViewLink}" target="_blank" rel="noopener">View document &rarr;</a></div>`
                }
              </div>
            </div>`)
          .join("");

      } catch (err) {
        UI.showError(container, "Announcements could not be loaded. Please call the township office at " + CONFIG.phone + " or check back later.");
        console.error(err);
      }
    })();
  </script>

</body>
</html>
